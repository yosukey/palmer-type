name: Build Windows EXE (PyInstaller)

on:
  push:
    tags:
      - "v*"          # Automatically release on tags like v1.0.0
  workflow_dispatch:  # Manual trigger is also available

env:
  TECTONIC_VERSION: "0.15.0"

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: pip install -r src/requirements.txt -r src/requirements-dev.txt

      - name: Cache tectonic binary
        id: cache-tectonic
        uses: actions/cache@v4
        with:
          path: src/bin/tectonic.exe
          key: tectonic-${{ env.TECTONIC_VERSION }}-x86_64-pc-windows-msvc

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Download tectonic
        if: steps.cache-tectonic.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%40${{ env.TECTONIC_VERSION }}/tectonic-${{ env.TECTONIC_VERSION }}-x86_64-pc-windows-msvc.zip"
          $zip = "tectonic.zip"
          $dest = "src/bin"

          Write-Host "Downloading tectonic ${{ env.TECTONIC_VERSION }} ..."
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing

          Write-Host "Extracting to $dest ..."
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          Remove-Item $zip

          if (!(Test-Path "$dest/tectonic.exe")) {
            Write-Error "tectonic.exe not found after extraction"
            exit 1
          }
          $size = (Get-Item "$dest/tectonic.exe").Length / 1MB
          Write-Host "tectonic.exe: $([math]::Round($size, 1)) MB"

      - name: Download palmer.sty
        shell: pwsh
        run: |
          $url = "https://raw.githubusercontent.com/yosukey/palmer-latex/main/palmer.sty"
          $dest = "src/palmer.sty"

          Write-Host "Downloading palmer.sty from main branch ..."
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing

          if (!(Test-Path $dest)) {
            Write-Error "palmer.sty download failed"
            exit 1
          }
          Write-Host "palmer.sty: $((Get-Item $dest).Length) bytes"

      - name: Set version from tag
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -match "^refs/tags/v(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z._-]*)?)$") {
            $version = $Matches[1]
          } elseif ($ref -match "^refs/tags/v(.+)$") {
            Write-Error "Tag '$($Matches[1])' is not semver-compliant (expected vX.Y.Z or vX.Y.Z-pre). Aborting build."
            exit 1
          } else {
            $version = "dev"
          }
          "__version__ = '$version'" | Out-File -FilePath src/version.py -Encoding utf8 -NoNewline
          Write-Host "version: $version"

      - name: Build bundled exe (palmer-type-{version}.exe)
        run: python src/build_exe.py

      - name: Build modular exe (palmer-type-modular-{version}.exe)
        run: python src/build_exe.py --modular

      - name: Build installer (palmer-type-{version}-win-x64-setup.exe)
        run: python src/build_exe.py --installer

      - name: List artifacts
        run: |
          Get-ChildItem dist/ -Recurse | Select-Object FullName, Length
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PalmerType
          path: dist/palmer-type-*.exe
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/palmer-type-*.exe
          generate_release_notes: true
