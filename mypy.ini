[mypy]
python_version = 3.10
mypy_path = src
files = src/
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-docx.*]
ignore_missing_imports = True

[mypy-pypdfium2.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-winreg]
ignore_missing_imports = True
